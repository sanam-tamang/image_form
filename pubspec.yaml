name: image_form

description: >
  A production-ready Flutter package for single and multiple image form fields.
  Supports local and network images, cropping, caching, validation,
  ChangeNotifier controllers, tap-to-view, customizable shapes,
  and editable overlays.

version: 0.1.1

homepage: https://github.com/sanam-tamang/image_form
repository: https://github.com/sanam-tamang/image_form
issue_tracker: https://github.com/sanam-tamang/image_form/issues

topics:
  - flutter
  - image-picker
  - forms
  - image
  - crop

environment:
  sdk: ^3.10.3
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter

  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  image_cropper: ^12.2.1
  image_picker: ^1.2.3
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

