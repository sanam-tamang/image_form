name: image_form
description: >
  A fully-featured Flutter FormField for single and multiple images.
  Supports network + local images, caching, crop, validation,
  ChangeNotifier controller, tap-to-view, custom shapes, and
  editable overlays. Works with any use case — avatars, thumbnails,
  logos, banners, certificates, and more.
version: 0.0.1
homepage: https://github.com/sanam-tamang/image_form
repository: https://github.com/sanam-tamang/image_form
environment:
  sdk: ^3.10.3
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  image_cropper: ^12.2.1
  flutter_cache_manager: ^3.3.1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
